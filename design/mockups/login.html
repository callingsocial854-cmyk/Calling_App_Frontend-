<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZuStation — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* ── Page shell ──────────────────────────────────────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1A1A1A;
      padding: 24px 16px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Background geometric accents ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      bottom: -60px;
      right: -60px;
      width: 380px;
      height: 380px;
      background: linear-gradient(135deg, #A4161A 0%, #E63946 100%);
      clip-path: polygon(40% 0%, 100% 0%, 100% 60%, 60% 100%, 0% 100%, 0% 40%);
      opacity: 0.13;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20px;
      right: -20px;
      width: 220px;
      height: 220px;
      background: linear-gradient(135deg, #E63946 0%, #A4161A 100%);
      clip-path: polygon(50% 0%, 100% 0%, 100% 50%, 50% 100%, 0% 100%, 0% 50%);
      opacity: 0.22;
      pointer-events: none;
      z-index: 0;
    }

    .bg-accent-top-left {
      position: fixed;
      top: -80px;
      left: -80px;
      width: 260px;
      height: 260px;
      background: linear-gradient(135deg, #A4161A 0%, #E63946 100%);
      clip-path: polygon(0% 0%, 100% 0%, 0% 100%);
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ─────────────────────────────────────────────────────── */
    .login-card {
      position: relative;
      z-index: 1;
      background: #FFFFFF;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45), 0 4px 16px rgba(230,57,70,0.12);
      width: 100%;
      max-width: 420px;
      padding: 48px 40px 40px;
      overflow: hidden;
    }

    /* Card top-right red stripe accent */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #A4161A 0%, #E63946 100%);
      clip-path: polygon(100% 0%, 0% 0%, 100% 100%);
      opacity: 0.85;
    }

    /* ── Logo block ───────────────────────────────────────────────── */
    .logo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .logo-block svg {
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 4px 12px rgba(230,57,70,0.35));
    }

    .brand-name {
      margin-top: 10px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #A4161A, #E63946);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Headings ─────────────────────────────────────────────────── */
    .card-heading {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1A1A1A;
      text-align: center;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .card-subtitle {
      font-size: 0.9rem;
      color: #9E9E9E;
      text-align: center;
      margin-bottom: 32px;
      font-weight: 400;
    }

    /* ── Form elements ────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4A4A4A;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: #9E9E9E;
      pointer-events: none;
      transition: color 250ms ease;
      flex-shrink: 0;
    }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      border: 1.5px solid #E8E8E8;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      color: #1A1A1A;
      background: #F9F9F9;
      outline: none;
      transition: border-color 250ms ease, box-shadow 250ms ease, background 250ms ease;
      -webkit-appearance: none;
    }

    .form-input::placeholder {
      color: #BDBDBD;
    }

    .form-input:focus {
      border-color: #E63946;
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(230,57,70,0.12);
    }

    .form-input:focus + .input-icon-right,
    .input-wrapper:focus-within .input-icon {
      color: #E63946;
    }

    /* Password toggle */
    .input-suffix {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #9E9E9E;
      display: flex;
      align-items: center;
      transition: color 250ms ease;
      border-radius: 4px;
    }

    .input-suffix:hover {
      color: #E63946;
    }

    .form-input-pw {
      padding-right: 46px;
    }

    /* Forgot password row */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 24px;
    }

    .forgot-link {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #E63946;
      text-decoration: none;
      transition: color 250ms ease, text-decoration 250ms ease;
    }

    .forgot-link:hover {
      color: #A4161A;
      text-decoration: underline;
    }

    /* ── Primary button ───────────────────────────────────────────── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 15px 24px;
      background: linear-gradient(135deg, #A4161A 0%, #E63946 100%);
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: transform 150ms ease, box-shadow 250ms ease, opacity 250ms ease;
      box-shadow: 0 4px 16px rgba(230,57,70,0.38);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 60%);
      opacity: 0;
      transition: opacity 250ms ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(230,57,70,0.48);
    }

    .btn-primary:hover::after {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(230,57,70,0.3);
    }

    /* ── Divider ──────────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #E8E8E8;
    }

    .divider-text {
      font-size: 0.75rem;
      color: #BDBDBD;
      font-weight: 500;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Social buttons ───────────────────────────────────────────── */
    .social-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      border: 1.5px solid #E8E8E8;
      border-radius: 10px;
      background: #FFFFFF;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #4A4A4A;
      cursor: pointer;
      transition: border-color 250ms ease, background 250ms ease, box-shadow 250ms ease, transform 150ms ease;
    }

    .btn-social:hover {
      border-color: #E63946;
      background: #FFF8F8;
      box-shadow: 0 2px 8px rgba(230,57,70,0.1);
      transform: translateY(-1px);
      color: #1A1A1A;
    }

    .btn-social:active {
      transform: translateY(0);
    }

    /* ── Footer link ──────────────────────────────────────────────── */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.875rem;
      color: #9E9E9E;
    }

    .card-footer a {
      color: #E63946;
      font-weight: 600;
      text-decoration: none;
      transition: color 250ms ease;
    }

    .card-footer a:hover {
      color: #A4161A;
      text-decoration: underline;
    }

    /* ── Mobile tweaks ────────────────────────────────────────────── */
    @media (max-width: 460px) {
      .login-card {
        padding: 36px 24px 32px;
        border-radius: 16px;
      }

      .card-heading {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Background accent -->
  <div class="bg-accent-top-left" aria-hidden="true"></div>

  <!-- ── Login Card ──────────────────────────────────────────────── -->
  <main class="login-card" role="main">

    <!-- Logo -->
    <div class="logo-block">
      <!-- Inline logo SVG (64px) -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-label="ZuStation logo" role="img">
        <defs>
          <linearGradient id="lg-a" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A4161A"/>
            <stop offset="100%" stop-color="#E63946"/>
          </linearGradient>
          <linearGradient id="lg-diamond" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A4161A" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#E63946" stop-opacity="0.08"/>
          </linearGradient>
          <linearGradient id="lg-crossbar" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#A4161A"/>
            <stop offset="100%" stop-color="#E63946"/>
          </linearGradient>
        </defs>
        <polygon points="40,6 68,40 40,74 12,40" fill="url(#lg-diamond)" stroke="#E63946" stroke-width="1" stroke-opacity="0.22"/>
        <polygon points="40,10 28,68 38,68 46,28" fill="url(#lg-a)"/>
        <polygon points="40,10 52,68 42,68 34,28" fill="url(#lg-a)"/>
        <rect x="27" y="42" width="26" height="8" rx="1" fill="url(#lg-crossbar)"/>
        <polygon points="40,10 44,18 40,22 36,18" fill="#FFFFFF" fill-opacity="0.22"/>
      </svg>
      <span class="brand-name">ZuStation</span>
    </div>

    <!-- Headings -->
    <h1 class="card-heading">Welcome back</h1>
    <p class="card-subtitle">Sign in to continue</p>

    <!-- Form -->
    <form id="loginForm" novalidate onsubmit="handleLogin(event)">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrapper">
          <!-- Envelope icon -->
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <!-- Lock icon -->
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input
            id="password"
            type="password"
            class="form-input form-input-pw"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <!-- Show/hide toggle -->
          <button
            type="button"
            class="input-suffix"
            id="pwToggle"
            aria-label="Toggle password visibility"
            onclick="togglePassword()"
          >
            <!-- Eye icon -->
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Forgot password -->
      <div class="forgot-row">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <!-- Divider -->
    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <!-- Social login -->
    <div class="social-row">
      <button type="button" class="btn-social" aria-label="Continue with Google">
        <!-- Google "G" icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Footer -->
    <p class="card-footer">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </p>

  </main>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      const isHidden = input.type === 'password';

      input.type = isHidden ? 'text' : 'password';

      // Swap between eye / eye-off icons
      icon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
           <circle cx="12" cy="12" r="3"/>`;
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-primary');
      btn.textContent = 'Signing in…';
      btn.style.opacity = '0.8';
      btn.disabled = true;
      // Simulate async
      setTimeout(() => {
        btn.textContent = '✓ Signed In!';
        btn.style.background = 'linear-gradient(135deg,#2D6A4F,#40916C)';
        btn.style.opacity = '1';
      }, 1200);
    }
  </script>
</body>
</html>
