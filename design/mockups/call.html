<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZuStation — Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #1A1A1A;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
    }

    /* ── Geometric background patterns ───────────────────────────────────── */
    .bg-pattern {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .bg-shape {
      position: absolute;
      background: linear-gradient(135deg, #A4161A, #E63946);
      opacity: 0.07;
    }

    .bg-shape-1 {
      width: 420px; height: 420px;
      top: -120px; left: -80px;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    .bg-shape-2 {
      width: 280px; height: 280px;
      bottom: -60px; right: -40px;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0.09;
    }

    .bg-shape-3 {
      width: 160px; height: 400px;
      top: 30%;  right: 12%;
      clip-path: polygon(40% 0%, 100% 0%, 60% 100%, 0% 100%);
      opacity: 0.05;
    }

    .bg-shape-4 {
      width: 120px; height: 300px;
      top: 10%;  left: 10%;
      clip-path: polygon(0% 0%, 60% 0%, 100% 100%, 40% 100%);
      opacity: 0.04;
    }

    .bg-shape-5 {
      width: 80px; height: 80px;
      bottom: 25%; left: 8%;
      border-radius: 50%;
      background: #E63946;
      opacity: 0.06;
    }

    /* ── Call Container ───────────────────────────────────────────────────── */
    .call-container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 24px 40px;
      position: relative;
      z-index: 1;
    }

    /* ── Top Bar ──────────────────────────────────────────────────────────── */
    .call-topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      transition: background 0.2s;
      backdrop-filter: blur(8px);
    }

    .back-btn:hover { background: rgba(255,255,255,0.14); }
    .back-btn svg { width: 18px; height: 18px; }

    .topbar-logo {
      display: flex; align-items: center; gap: 8px;
    }

    .topbar-logo-text {
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }

    .topbar-logo-text span { color: #E63946; }

    .topbar-more {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
    }

    .topbar-more svg { width: 18px; height: 18px; }

    /* ── Caller Info ──────────────────────────────────────────────────────── */
    .caller-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: -20px;
    }

    .avatar-wrapper {
      position: relative;
      width: 130px; height: 130px;
      display: flex; align-items: center; justify-content: center;
    }

    .avatar-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid rgba(230,57,70,0.6);
      animation: pulseRing 2s ease-out infinite;
    }

    .avatar-ring-2 {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 2px solid rgba(230,57,70,0.3);
      animation: pulseRing 2s ease-out infinite 0.5s;
    }

    @keyframes pulseRing {
      0%   { transform: scale(1);    opacity: 1; }
      70%  { transform: scale(1.12); opacity: 0; }
      100% { transform: scale(1.12); opacity: 0; }
    }

    .caller-avatar {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #A4161A 0%, #E63946 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      font-weight: 700;
      color: #fff;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 0 4px rgba(230,57,70,0.25);
      overflow: hidden;
    }

    .caller-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .caller-name {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.1;
    }

    .caller-role {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-top: -12px;
    }

    .call-status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: -4px;
    }

    .call-status-text {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    .dots-anim span {
      display: inline-block;
      animation: dotBounce 1.4s ease-in-out infinite;
      color: rgba(255,255,255,0.6);
    }

    .dots-anim span:nth-child(2) { animation-delay: 0.2s; }
    .dots-anim span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.3; }
      40%            { opacity: 1; }
    }

    .call-timer {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      display: none;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(230,57,70,0.18);
      border: 1px solid rgba(230,57,70,0.45);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      color: #E63946;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: none;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #E63946;
      animation: livePulse 1.2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Call Quality Box ─────────────────────────────────────────────────── */
    .quality-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(10px);
      display: none;
    }

    .quality-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .quality-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
    }

    .quality-bar {
      width: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
    }

    .quality-bar.active { background: #4CAF50; }

    .quality-bar:nth-child(1) { height: 5px; }
    .quality-bar:nth-child(2) { height: 8px; }
    .quality-bar:nth-child(3) { height: 11px; }
    .quality-bar:nth-child(4) { height: 14px; }
    .quality-bar:nth-child(5) { height: 16px; }

    .quality-text {
      font-size: 0.72rem;
      color: #4CAF50;
      font-weight: 600;
    }

    .quality-network {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
      margin-left: auto;
    }

    /* ── Control Buttons ──────────────────────────────────────────────────── */
    .call-controls {
      width: 100%;
      display: none;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .ctrl-circle {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
      backdrop-filter: blur(12px);
      position: relative;
    }

    .ctrl-circle:hover { background: rgba(255,255,255,0.13); transform: translateY(-2px); }
    .ctrl-circle.active-toggle { background: rgba(255,255,255,0.18); }
    .ctrl-circle svg { width: 20px; height: 20px; color: rgba(255,255,255,0.75); }

    .ctrl-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
      text-align: center;
    }

    .ctrl-btn.end-call .ctrl-circle {
      width: 64px; height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #A4161A, #E63946);
      border-color: transparent;
      box-shadow: 0 6px 24px rgba(230,57,70,0.5);
    }

    .ctrl-btn.end-call .ctrl-circle:hover {
      background: linear-gradient(135deg, #8b1015, #c82030);
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(230,57,70,0.6);
    }

    .ctrl-btn.end-call .ctrl-circle svg { color: #fff; width: 22px; height: 22px; }
    .ctrl-btn.end-call .ctrl-label { color: rgba(255,255,255,0.6); }

    .add-participant {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      margin-top: 12px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .add-participant:hover { color: rgba(255,255,255,0.45); }

    /* ── Incoming Overlay ─────────────────────────────────────────────────── */
    .incoming-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,20,20,0.92);
      backdrop-filter: blur(12px);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 24px 60px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .incoming-overlay.hiding {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
    }

    .incoming-header { text-align: center; }

    .incoming-label {
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .incoming-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.04em;
    }

    .incoming-avatar-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 140px; height: 140px;
      margin: 0 auto;
    }

    .incoming-pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(230,57,70,0.5);
      animation: incomingPulse 2s ease-out infinite;
    }

    .incoming-pulse-ring-2 {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 2px solid rgba(230,57,70,0.25);
      animation: incomingPulse 2s ease-out infinite 0.6s;
    }

    .incoming-pulse-ring-3 {
      position: absolute;
      inset: -36px;
      border-radius: 50%;
      border: 1.5px solid rgba(230,57,70,0.12);
      animation: incomingPulse 2s ease-out infinite 1.2s;
    }

    @keyframes incomingPulse {
      0%   { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }

    .incoming-avatar {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: linear-gradient(135deg, #A4161A, #E63946);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem;
      font-weight: 700;
      color: #fff;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 0 5px rgba(230,57,70,0.2);
    }

    .incoming-caller-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-top: 20px;
      letter-spacing: -0.02em;
    }

    .incoming-caller-role {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-top: 4px;
    }

    .incoming-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .incoming-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
    }

    .inc-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .inc-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .inc-circle:hover { transform: scale(1.08); }

    .inc-circle.answer {
      background: linear-gradient(135deg, #1a7a3a, #2ecc71);
      box-shadow: 0 6px 24px rgba(46,204,113,0.45);
    }

    .inc-circle.decline {
      background: linear-gradient(135deg, #A4161A, #E63946);
      box-shadow: 0 6px 24px rgba(230,57,70,0.45);
    }

    .inc-circle svg { width: 28px; height: 28px; color: #fff; }

    .inc-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    .swipe-hint {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .swipe-hint svg { width: 14px; height: 14px; animation: swipeAnim 2s ease-in-out infinite; }

    @keyframes swipeAnim {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(8px); }
    }
  </style>
</head>
<body>

<!-- Background Patterns -->
<div class="bg-pattern">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>
  <div class="bg-shape bg-shape-4"></div>
  <div class="bg-shape bg-shape-5"></div>
</div>

<!-- ── Incoming Call Overlay ─────────────────────────────────────────────── -->
<div class="incoming-overlay" id="incomingOverlay">

  <div class="incoming-header">
    <div class="incoming-label">Incoming Call</div>
    <div class="incoming-title">ZuStation</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
    <div class="incoming-avatar-wrap">
      <div class="incoming-pulse-ring"></div>
      <div class="incoming-pulse-ring-2"></div>
      <div class="incoming-pulse-ring-3"></div>
      <div class="incoming-avatar">SJ</div>
    </div>
    <div class="incoming-caller-name">Sarah Johnson</div>
    <div class="incoming-caller-role">Support Agent · ZuStation</div>
  </div>

  <div class="incoming-actions">
    <div class="incoming-buttons">
      <div class="inc-btn" onclick="declineCall()">
        <div class="inc-circle decline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 17v-2.5a2 2 0 0 0-1.17-1.82L18 11l-2 2a15 15 0 0 1-6-6l2-2-1.68-3.83A2 2 0 0 0 8.5 1H6a2 2 0 0 0-2 2v.5"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </div>
        <span class="inc-label">Decline</span>
      </div>

      <div class="inc-btn" onclick="answerCall()">
        <div class="inc-circle answer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <span class="inc-label">Answer</span>
      </div>
    </div>

    <div class="swipe-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
      Swipe right to answer
    </div>
  </div>
</div>

<!-- ── Active Call Screen ────────────────────────────────────────────────── -->
<div class="call-container">

  <!-- Top Bar -->
  <div class="call-topbar">
    <button class="back-btn" onclick="history.back()" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="topbar-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" width="24" height="24">
        <defs>
          <linearGradient id="cg-a" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A4161A"/>
            <stop offset="100%" stop-color="#E63946"/>
          </linearGradient>
        </defs>
        <polygon points="40,10 28,68 38,68 46,28" fill="url(#cg-a)"/>
        <polygon points="40,10 52,68 42,68 34,28" fill="url(#cg-a)"/>
        <rect x="27" y="42" width="26" height="8" rx="1" fill="url(#cg-a)"/>
      </svg>
      <span class="topbar-logo-text">Zu<span>Station</span></span>
    </div>

    <div class="topbar-more">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
      </svg>
    </div>
  </div>

  <!-- Caller Info -->
  <div class="caller-info">
    <div class="avatar-wrapper">
      <div class="avatar-ring"></div>
      <div class="avatar-ring-2"></div>
      <div class="caller-avatar">SJ</div>
    </div>

    <div style="text-align:center;">
      <div class="caller-name">Sarah Johnson</div>
      <div class="caller-role">Support Agent · ZuStation</div>
    </div>

    <div class="call-status-row">
      <div class="call-status-text" id="callingText">
        Calling<span class="dots-anim"><span>.</span><span>.</span><span>.</span></span>
      </div>
      <div class="call-timer" id="callTimer">00:00</div>
      <div class="live-pill" id="livePill">
        <span class="live-dot"></span>LIVE
      </div>
    </div>

    <!-- Quality Box -->
    <div class="quality-box" id="qualityBox">
      <div>
        <div class="quality-label">Signal</div>
        <div class="quality-bars">
          <div class="quality-bar active"></div>
          <div class="quality-bar active"></div>
          <div class="quality-bar active"></div>
          <div class="quality-bar active"></div>
          <div class="quality-bar"></div>
        </div>
      </div>
      <div class="quality-text">Good</div>
      <div class="quality-network">HD · 128kbps</div>
    </div>
  </div>

  <!-- Control Buttons -->
  <div class="call-controls" id="callControls">
    <div class="controls-row">
      <!-- Mute -->
      <div class="ctrl-btn" onclick="toggleCtrl(this, 'Muted', 'Mute')">
        <div class="ctrl-circle" id="muteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
            <path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <span class="ctrl-label">Mute</span>
      </div>

      <!-- Speaker -->
      <div class="ctrl-btn" onclick="toggleCtrl(this, 'Speaker On', 'Speaker')">
        <div class="ctrl-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
            <path d="M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
        </div>
        <span class="ctrl-label">Speaker</span>
      </div>

      <!-- End Call — center, larger -->
      <div class="ctrl-btn end-call" onclick="endCall()">
        <div class="ctrl-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 17v-2.5a2 2 0 0 0-1.17-1.82L18 11l-2 2a15 15 0 0 1-6-6l2-2-1.68-3.83A2 2 0 0 0 8.5 1H6a2 2 0 0 0-2 2v.5"/>
            <line x1="2" y1="2" x2="22" y2="22"/>
          </svg>
        </div>
        <span class="ctrl-label">End Call</span>
      </div>

      <!-- Video -->
      <div class="ctrl-btn" onclick="toggleCtrl(this, 'Video On', 'Video')">
        <div class="ctrl-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </div>
        <span class="ctrl-label">Video</span>
      </div>

      <!-- Hold -->
      <div class="ctrl-btn" onclick="toggleCtrl(this, 'Held', 'Hold')">
        <div class="ctrl-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </div>
        <span class="ctrl-label">Hold</span>
      </div>
    </div>

    <div class="add-participant">+ Tap to add participant</div>
  </div>

</div>

<script>
  let timerInterval = null;
  let seconds = 0;
  const callingText = document.getElementById('callingText');
  const callTimer   = document.getElementById('callTimer');
  const livePill    = document.getElementById('livePill');
  const qualityBox  = document.getElementById('qualityBox');
  const callControls = document.getElementById('callControls');

  function answerCall() {
    const overlay = document.getElementById('incomingOverlay');
    overlay.classList.add('hiding');
    setTimeout(() => {
      overlay.style.display = 'none';
      startCallTimer();
    }, 500);
  }

  function declineCall() {
    const overlay = document.getElementById('incomingOverlay');
    overlay.classList.add('hiding');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
  }

  function startCallTimer() {
    callControls.style.display = 'block';
    qualityBox.style.display = 'flex';

    // After 3s switch from "Calling..." to timer + LIVE badge
    setTimeout(() => {
      callingText.style.display = 'none';
      callTimer.style.display = 'inline';
      livePill.style.display = 'inline-flex';
    }, 3000);

    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      callTimer.textContent = `${m}:${s}`;
    }, 1000);
  }

  function endCall() {
    clearInterval(timerInterval);
    // Animate back or redirect
    document.body.style.transition = 'opacity 0.4s';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 400);
  }

  function toggleCtrl(btn, activeLabel, defaultLabel) {
    const circle = btn.querySelector('.ctrl-circle');
    const label  = btn.querySelector('.ctrl-label');
    const isActive = circle.classList.toggle('active-toggle');
    label.textContent = isActive ? activeLabel : defaultLabel;
  }
</script>
</body>
</html>
